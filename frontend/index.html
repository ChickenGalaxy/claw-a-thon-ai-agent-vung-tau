
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZaloPay AI Agent</title>
  <style>
    :root {
      --bg: #f0ede8;
      --panel: #faf8f5;
      --soft: #ebe7e1;
      --border: #d9d4cc;
      --text: #1c1917;
      --muted: #8a8278;
      --blue: #0068FF;
      --blue-dark: #0052cc;
      --green: #06C755;
      --accent-soft: rgba(0,104,255,.09);
      --danger: #dc2626;
      --aside-bg: #f5f2ed;
    }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }

    /* === SHELL — 3 columns: aside | toggle-rail | main === */
    .shell {
      display: grid;
      grid-template-columns: 272px 28px minmax(0,1fr);
      min-height: 100vh; max-width: 100vw; overflow: hidden;
      transition: grid-template-columns .28s cubic-bezier(.4,0,.2,1);
    }
    .shell.collapsed { grid-template-columns: 0px 28px minmax(0,1fr); }

    /* === ASIDE === */
    aside {
      background: var(--aside-bg); border-right: 1px solid var(--border);
      padding: 16px; display: grid;
      grid-template-rows: auto auto minmax(0,1fr) auto;
      gap: 14px; overflow: hidden;
      transition: opacity .2s ease;
    }
    .shell.collapsed aside { opacity: 0; pointer-events: none; }

    /* === TOGGLE RAIL (always visible) === */
    .sidebar-rail {
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); border-right: 1px solid var(--border);
      position: relative; cursor: pointer;
      transition: background .15s;
    }
    .sidebar-rail:hover { background: var(--soft); }
    .sidebar-rail::before {
      content: ''; position: absolute; inset: 0;
      opacity: 0; transition: opacity .15s;
    }
    #sidebar-toggle {
      width: 22px; height: 44px; border-radius: 11px;
      background: var(--panel); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px; font-weight: 700;
      color: var(--muted); line-height: 1;
      transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      user-select: none;
    }
    .sidebar-rail:hover #sidebar-toggle {
      background: var(--blue); color: #fff;
      border-color: var(--blue);
      box-shadow: 0 2px 8px rgba(0,104,255,.3);
    }

    /* Brand */
    .brand { min-width:0; line-height:1.2; overflow:hidden; padding:6px 0 2px; }
    .brand-logo { display:flex; align-items:baseline; font-size:22px; font-weight:900; letter-spacing:-0.5px; }
    .brand-logo .zalo { color:var(--blue); }
    .brand-logo .pay  { color:var(--green); }
    .brand-sub { font-size:11px; color:var(--muted); font-weight:500; margin-top:2px; }

    .panel { border:1px solid var(--border); background:var(--panel); border-radius:12px; padding:12px; }
    button { border:0; border-radius:10px; padding:9px 14px; font-weight:700; cursor:pointer; transition:opacity .15s,background .15s; font-family:inherit; }
    #new-session { width:100%; background:linear-gradient(135deg,var(--blue) 0%,var(--green) 100%); color:#fff; font-size:13px; }
    #new-session:hover { opacity:.88; }
    button:disabled { opacity:.45; cursor:wait; }

    .muted { color:var(--muted); font-size:12px; line-height:1.45; }
    .section-title { color:var(--muted); font-size:11px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; margin:4px 0 6px; }

    #sessions { min-width:0; display:grid; gap:5px; overflow:auto; }
    .session-item { min-width:0; border:1px solid var(--border); background:var(--panel); border-radius:10px; padding:8px 10px; cursor:pointer; overflow:hidden; transition:border-color .15s,background .15s; }
    .session-item.active { border-color:var(--blue); background:var(--accent-soft); }
    .session-item:hover:not(.active) { background:var(--soft); }
    .session-row { display:grid; grid-template-columns:minmax(0,1fr) auto; align-items:flex-start; gap:6px; }
    .session-meta { min-width:0; }
    .session-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; }
    .session-item:hover .session-actions { opacity:1; }
    .icon-button { border:1px solid var(--border); border-radius:7px; padding:3px 7px; background:var(--soft); color:var(--muted); font-size:11px; line-height:1.4; cursor:pointer; font-family:inherit; }
    .icon-button:hover { color:var(--blue); border-color:var(--blue); background:var(--panel); }
    .icon-button.danger:hover { color:var(--danger); border-color:var(--danger); }
    .session-title { font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .session-title-input { width:100%; border:1px solid var(--blue); border-radius:7px; padding:4px 8px; background:var(--panel); color:var(--text); font:inherit; font-weight:600; outline:none; font-size:13px; }
    input[type=file] { width:100%; color:var(--muted); font-size:12px; }

    /* === MAIN === */
    main { display:grid; grid-template-rows:auto auto 1fr auto auto; min-width:0; max-height:100vh; overflow:hidden; background:var(--bg); }
    header    { grid-row:1; padding:12px 24px; border-bottom:1px solid var(--border); background:var(--panel); display:flex; align-items:center; gap:14px; }
    .search-bar { grid-row:2; }
    #chat       { grid-row:3; }
    #suggestions{ grid-row:4; }
    footer      { grid-row:5; }
    .header-info { flex:1; min-width:0; }
    .header-title-row { display:flex; align-items:center; gap:10px; }
    .header-logo { display:flex; align-items:baseline; font-size:16px; font-weight:900; letter-spacing:-0.5px; flex-shrink:0; }
    .header-logo .zalo { color:var(--blue); }
    .header-logo .pay  { color:var(--green); }
    .header-agent-name { font-size:14px; font-weight:700; }
    .header-online { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--green); font-weight:600; }
    .header-subtitle { font-size:12px; color:var(--muted); margin-top:1px; }
    #status { display:none; }
    .status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 5px rgba(6,199,85,.55); }

    /* === SEARCH === */
    .search-btn {
      width:38px; height:38px; border-radius:10px; border:1px solid var(--border);
      background:var(--soft); color:var(--muted); cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:background .15s, border-color .15s, color .15s, box-shadow .15s;
    }
    .search-btn:hover { background:var(--accent-soft); border-color:var(--blue); color:var(--blue); box-shadow:0 2px 8px rgba(0,104,255,.12); }
    .search-btn.active { background:var(--accent-soft); border-color:var(--blue); color:var(--blue); box-shadow:0 2px 8px rgba(0,104,255,.15); }
    .search-bar {
      display:none; align-items:center; gap:10px;
      padding:10px 24px; background:var(--panel); border-bottom:1px solid var(--border);
      animation: slideDown .18s ease;
    }
    @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .search-bar.open { display:flex; }
    .search-bar input {
      flex:1; border:1px solid var(--border); border-radius:10px; padding:8px 14px;
      font:inherit; font-size:13px; background:var(--soft); color:var(--text); outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .search-bar input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,104,255,.08); }
    .search-nav { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .search-nav button {
      width:30px; height:30px; border-radius:8px; border:1px solid var(--border);
      background:var(--soft); color:var(--muted); cursor:pointer; font-size:12px;
      display:flex; align-items:center; justify-content:center; padding:0; line-height:1;
    }
    .search-nav button:hover { border-color:var(--blue); color:var(--blue); background:var(--accent-soft); }
    .search-count { font-size:12px; color:var(--muted); min-width:64px; text-align:center; flex-shrink:0; }
    .search-close { background:none; border:0; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; padding:2px 4px; flex-shrink:0; }
    .search-close:hover { color:var(--text); }
    mark { background:rgba(255,193,7,.45); border-radius:3px; color:inherit; padding:0 1px; }
    .message.search-current { outline:2px solid var(--blue); outline-offset:3px; border-radius:16px; }

    /* === SKELETON === */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skeleton-line {
      height:12px; border-radius:6px; margin-bottom:8px;
      background: linear-gradient(90deg, var(--soft) 25%, var(--border) 50%, var(--soft) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    .skeleton-line:last-child { margin-bottom:0; width:60%; }

    /* === SUGGESTED PROMPTS === */
    .suggestions { padding:16px 24px 0; display:flex; flex-direction:column; gap:10px; }
    .suggestions-label { font-size:11px; font-weight:800; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; }
    .suggestions-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .suggestion-chip {
      border:1px solid var(--border); background:var(--panel); border-radius:12px;
      padding:11px 13px; cursor:pointer; font-size:12px; color:var(--text);
      line-height:1.45; text-align:left; font-weight:600;
      transition:border-color .15s,background .15s,box-shadow .15s,transform .15s;
      display:flex; align-items:center; gap:9px;
    }
    .suggestion-chip:hover {
      border-color:var(--blue); background:var(--accent-soft);
      box-shadow:0 2px 8px rgba(0,104,255,.1); transform:translateY(-1px);
    }
    .suggestion-chip .chip-icon {
      width:22px; height:22px; border-radius:7px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,rgba(0,104,255,.12),rgba(6,199,85,.12));
      color:var(--blue); font-size:14px; line-height:1; margin:0;
    }
    .suggestion-chip .chip-text { min-width:0; }

    /* === FILE UPLOAD === */
    .file-limit-note { font-size:11px; color:var(--muted); margin-top:6px; }
    #file-list { display:flex; flex-direction:column; gap:4px; margin-top:8px; }
    .file-pill {
      display:flex; align-items:center; gap:8px;
      background:var(--panel); border:1px solid var(--border);
      border-radius:8px; padding:6px 10px; font-size:12px; overflow:hidden;
    }
    .file-pill-icon { font-size:14px; flex-shrink:0; }
    .file-pill-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); font-weight:500; }
    .file-pill-size { color:var(--muted); flex-shrink:0; font-size:11px; }
    .file-pill-remove { border:0; background:none; color:var(--muted); cursor:pointer; padding:0 2px; font-size:14px; line-height:1; flex-shrink:0; }
    .file-pill-remove:hover { color:var(--danger); }

    /* Attached files in composer */
    #attached-files { display:flex; flex-wrap:wrap; gap:6px; }
    .attached-pill {
      display:flex; align-items:center; gap:5px;
      background:var(--soft); border:1px solid var(--border);
      border-radius:20px; padding:3px 10px 3px 8px; font-size:11px; color:var(--text); font-weight:500;
    }
    .attached-pill button { border:0; background:none; cursor:pointer; color:var(--muted); padding:0; font-size:13px; line-height:1; }
    .attached-pill button:hover { color:var(--danger); }

    /* === CHAT === */
    #chat { overflow:auto; padding:20px 24px; display:flex; flex-direction:column; gap:12px; }
    .message { flex-shrink:0; max-width:min(780px,100%); overflow-wrap:anywhere; padding:12px 16px; border:1px solid var(--border); border-radius:16px; background:var(--panel); line-height:1.6; white-space:pre-wrap; font-size:14px; }
    .message img { display:block; max-width:min(100%,520px); height:auto; margin-top:10px; border-radius:12px; border:1px solid var(--border); }

    /* === RICH ASSISTANT RESPONSE === */
    .message.assistant { white-space: normal; padding: 14px 16px; }
    .message.user { white-space: pre-wrap; }
    .message.assistant h3 {
      margin: 0 0 10px; font-size: 15px; line-height: 1.35; font-weight: 800; letter-spacing: -0.01em;
    }
    .message.assistant h4 {
      margin: 14px 0 8px; font-size: 13px; line-height: 1.35; font-weight: 800; color: var(--text);
    }
    .message.assistant p { margin: 0 0 10px; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant strong { font-weight: 800; }
    .message.assistant ul, .message.assistant ol { margin: 6px 0 12px; padding-left: 20px; }
    .message.assistant li { margin: 3px 0; }
    .message.assistant code.inline-code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px; background: var(--soft); border: 1px solid var(--border);
      border-radius: 5px; padding: 1px 4px;
    }
    .data-table-wrap {
      width: 100%; overflow-x: auto; margin: 10px 0 12px;
      border: 1px solid var(--border); border-radius: 10px; background: #fffdf9;
    }
    table.data-table {
      width: 100%; border-collapse: collapse; font-size: 13px; line-height: 1.45; white-space: nowrap;
    }
    .data-table th {
      text-align: left; font-weight: 800; background: var(--soft); color: var(--text);
      border-bottom: 1px solid var(--border); padding: 8px 10px;
    }
    .data-table td { border-bottom: 1px solid var(--border); padding: 7px 10px; }
    .data-table tr:last-child td { border-bottom: 0; }
    .data-table th.num, .data-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .data-output, .code-output {
      margin: 10px 0 12px; padding: 11px 12px; border-radius: 10px; border: 1px solid var(--border);
      background: #141414; color: #f4f4f5; overflow-x: auto; font-size: 12px; line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space: pre; tab-size: 2;
    }
    .code-output { background: #fffdf9; color: var(--text); }
    .assistant-note {
      margin: 10px 0 0; padding: 9px 11px; border-left: 3px solid var(--blue);
      background: var(--accent-soft); border-radius: 8px; font-size: 13px;
    }

    .user { align-self:flex-end; background:var(--accent-soft); border-color:rgba(0,104,255,.22); }
    .assistant { align-self:flex-start; }
    .assistant h3 { margin:2px 0 10px; font-size:15px; line-height:1.35; }
    .assistant h4 { margin:14px 0 8px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
    .assistant table {
      width:100%; border-collapse:collapse; margin:10px 0 12px;
      font-size:13px; background:#fff; border:1px solid var(--border);
      border-radius:10px; overflow:hidden; display:block;
    }
    .assistant thead { background:var(--soft); }
    .assistant th, .assistant td { padding:8px 10px; border-bottom:1px solid var(--border); text-align:left; }
    .assistant th { font-weight:800; color:var(--text); }
    .assistant td.num, .assistant th.num { text-align:right; font-variant-numeric:tabular-nums; }
    .assistant pre {
      background:#171717; color:#f5f5f5; padding:12px 14px; border-radius:12px;
      overflow:auto; white-space:pre; font-size:12px; line-height:1.5; border:1px solid rgba(0,0,0,.12);
    }
    .error { color:var(--danger); }

    /* === THINKING / PROCESS === */
    @keyframes processIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .process {
      flex-shrink: 0;
      align-self: flex-start; max-width: min(640px,100%);
      border: 1px solid var(--border); border-radius: 14px;
      background: var(--panel); overflow: hidden;
      animation: processIn .22s ease forwards;
    }
    .process-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 10px 14px;
      background: var(--soft); border-bottom: 1px solid var(--border);
    }
    .process-head-left { display:flex; align-items:center; gap:8px; font-weight:700; color:var(--text); font-size:13px; }
    .process-spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--blue);
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    .process.done .process-spinner { display: none; }
    .process-done-icon { display:none; color:var(--green); font-size:14px; font-weight:900; }
    .process.done .process-done-icon { display:inline; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .process-toggle {
      color:var(--muted); background:var(--panel); border:1px solid var(--border);
      padding:4px 9px; border-radius:7px; font-size:11px; cursor:pointer; font-family:inherit;
      font-weight:600; flex-shrink:0;
    }
    .process-toggle:hover { border-color:var(--blue); color:var(--blue); }
    .process-body { padding: 10px 14px; }
    .process.collapsed .process-body { display: none; }
    .process-list { margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:6px; }
    .process-step {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 12px; line-height: 1.5; color: var(--text);
      padding: 7px 10px; border-radius: 8px; background: var(--soft);
      border: 1px solid var(--border);
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--blue);
      flex-shrink: 0; margin-top: 4px; opacity: .6;
    }
    .step-text { flex: 1; min-width: 0; }

    /* === FOOTER / COMPOSER === */
    footer { padding:10px 24px 16px; border-top:1px solid var(--border); background:var(--panel); }
    .composer { border:1px solid var(--border); border-radius:14px; background:var(--soft); padding:10px 12px; display:flex; align-items:flex-end; gap:10px; transition:border-color .2s,box-shadow .2s; }
    .composer:focus-within { border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,104,255,.08); }
    .composer-inner { flex:1; display:flex; flex-direction:column; gap:5px; }
    textarea { min-height:38px; max-height:120px; resize:none; width:100%; border:0; outline:0; color:var(--text); background:transparent; font:inherit; font-size:13px; line-height:1.5; }
    .composer-hint { font-size:11px; color:var(--muted); }
    #send { background:var(--blue); color:#fff; padding:8px 18px; font-size:13px; font-weight:700; border-radius:9px; flex-shrink:0; align-self:flex-end; }
    #send:hover:not(:disabled) { background:var(--blue-dark); }

    @media (max-width:860px) {
      .shell { grid-template-columns:1fr; }
      .shell.collapsed { grid-template-columns:1fr; }
      .sidebar-rail { display:none; }
      aside { width:100%; border-right:0; border-bottom:1px solid var(--border); }
      main { max-height:none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand">
        <div class="brand-logo"><span class="zalo">Zalo</span><span class="pay">pay</span></div>
        <div class="brand-sub">AI Agent Analytics</div>
      </div>
      <button id="new-session">+ New chat</button>
      <div>
        <div class="section-title">Sessions</div>
        <div id="sessions"></div>
      </div>
      <div>
        <div class="section-title">Files</div>
        <div class="panel">
          <input id="file-input" type="file" multiple accept=".csv,.pdf,.txt,.json,.md,.jpg,.jpeg,.png,.webp,text/*,application/pdf,image/*" />
          <div class="file-limit-note">📎 Tối đa 30MB · CSV, PDF, TXT, JSON, MD, JPG, PNG</div>
          <div id="file-list"></div>
        </div>
      </div>
    </aside>
    <div class="sidebar-rail" id="sidebar-rail">
      <div id="sidebar-toggle">&#8249;</div>
    </div>
    <main>
      <header>
        <div class="header-logo"><span class="zalo">Zalo</span><span class="pay">pay</span></div>
        <div class="header-info">
          <div class="header-title-row">
            <span class="header-agent-name" id="chat-title">Analytics Agent</span>
            <span class="header-online"><span class="status-dot"></span>Online</span>
          </div>
          <div class="header-subtitle">Ask, analyze, and generate product insights from your data</div>
        </div>
        <button class="search-btn" id="search-toggle" title="Tìm kiếm trong chat (⌘F)">
          <svg width="19" height="19" viewBox="0 0 19 19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="5.5"/><line x1="12.5" y1="12.5" x2="17" y2="17"/></svg>
        </button>
        <div id="status"></div>
      </header>
      <div class="search-bar" id="search-bar">
        <input id="search-input" type="text" placeholder="Tìm kiếm trong cuộc hội thoại..." autocomplete="off" />
        <div class="search-nav">
          <span class="search-count" id="search-count"></span>
          <button id="search-prev" title="Trước">▲</button>
          <button id="search-next" title="Sau">▼</button>
        </div>
        <button class="search-close" id="search-close" title="Đóng">✕</button>
      </div>
      <section id="chat"></section>
      <div id="suggestions" class="suggestions">
        <div class="suggestions-label">Suggested prompts</div>
        <div class="suggestions-grid">
          <button class="suggestion-chip" type="button" data-prompt="Interaction rate — view by month and by average day"><span class="chip-icon" aria-hidden="true">↗</span><span class="chip-text">Interaction rate (by month / avg day)</span></button>
          <button class="suggestion-chip" type="button" data-prompt="Conversion rate for all users"><span class="chip-icon" aria-hidden="true">↗</span><span class="chip-text">Conversion rate (All users)</span></button>
          <button class="suggestion-chip" type="button" data-prompt="Top 10 click rate by app, view by month"><span class="chip-icon" aria-hidden="true">↗</span><span class="chip-text">Top 10 click rate by app (by month)</span></button>
          <button class="suggestion-chip" type="button" data-prompt="Number of loads by day"><span class="chip-icon" aria-hidden="true">↗</span><span class="chip-text">Number of load by days</span></button>
        </div>
      </div>
      <footer>
        <form id="composer" class="composer">
          <div class="composer-inner">
            <div id="attached-files"></div>
            <textarea id="message" placeholder="Hỏi agent phân tích dữ liệu..." rows="1"></textarea>
            <span class="composer-hint">Enter để gửi · Shift+Enter để xuống dòng</span>
          </div>
          <button id="send" type="submit">Gửi ↑</button>
        </form>
      </footer>
    </main>
  </div>
  <script>
    const filesEl = document.getElementById("files");
    const sessionsEl = document.getElementById("sessions");
    const chatEl = document.getElementById("chat");
    const statusEl = document.getElementById("status");
    const titleEl = document.getElementById("chat-title");
    const inputEl = document.getElementById("file-input");
    const formEl = document.getElementById("composer");
    const sendEl = document.getElementById("send");
    const messageEl = document.getElementById("message");
    const suggestionsEl = document.getElementById("suggestions");
    const shellEl = document.querySelector(".shell");
    const toggleBtn = document.getElementById("sidebar-toggle");
    const railEl = document.getElementById("sidebar-rail");

    function showSuggestions(show) {
      if (suggestionsEl) suggestionsEl.style.display = show ? "" : "none";
    }

    // Sidebar collapse
    let sidebarCollapsed = localStorage.getItem("sidebar_collapsed") === "1";
    function applySidebar() {
      shellEl.classList.toggle("collapsed", sidebarCollapsed);
      toggleBtn.innerHTML = sidebarCollapsed ? "&#8250;" : "&#8249;";
      railEl.title = sidebarCollapsed ? "Mở sidebar" : "Thu gọn sidebar";
    }
    applySidebar();
    railEl.addEventListener("click", () => {
      sidebarCollapsed = !sidebarCollapsed;
      localStorage.setItem("sidebar_collapsed", sidebarCollapsed ? "1" : "0");
      applySidebar();
    });

    // Auto-resize textarea
    messageEl.addEventListener("input", () => {
      messageEl.style.height = "auto";
      messageEl.style.height = Math.min(messageEl.scrollHeight, 120) + "px";
    });

    document.querySelectorAll(".suggestion-chip").forEach(btn => {
      btn.addEventListener("click", () => {
        messageEl.value = btn.dataset.prompt;
        messageEl.dispatchEvent(new Event("input"));
        messageEl.focus();
        showSuggestions(false);
        formEl.requestSubmit();
      });
    });

    // === FILE UPLOAD STATE ===
    let uploadedFiles = []; // [{id, filename, size}]

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1048576).toFixed(1) + " MB";
    }

    function fileIcon(filename) {
      const ext = filename.split(".").pop().toLowerCase();
      if (ext === "pdf") return "📄";
      if (ext === "csv") return "📊";
      if (["txt","md"].includes(ext)) return "📝";
      if (ext === "json") return "🗂️";
      return "📎";
    }

    function renderFileList() {
      const listEl = document.getElementById("file-list");
      const attachedEl = document.getElementById("attached-files");
      if (!listEl || !attachedEl) return;

      // Sidebar file list
      listEl.innerHTML = "";
      for (const f of uploadedFiles) {
        const pill = document.createElement("div");
        pill.className = "file-pill";
        pill.innerHTML = `
          <span class="file-pill-icon">${fileIcon(f.filename)}</span>
          <span class="file-pill-name" title="${escapeHtml(f.filename)}">${escapeHtml(f.filename)}</span>
          <span class="file-pill-size">${fmtSize(f.size)}</span>
          <button class="file-pill-remove" data-id="${f.id}" title="Xoá">✕</button>`;
        pill.querySelector(".file-pill-remove").onclick = () => {
          uploadedFiles = uploadedFiles.filter(u => u.id !== f.id);
          renderFileList();
        };
        listEl.appendChild(pill);
      }

      // Composer attached pills
      attachedEl.innerHTML = "";
      attachedEl.style.display = uploadedFiles.length ? "" : "none";
      for (const f of uploadedFiles) {
        const pill = document.createElement("div");
        pill.className = "attached-pill";
        pill.innerHTML = `${fileIcon(f.filename)} <span>${escapeHtml(f.filename)}</span><button data-id="${f.id}" title="Xoá">✕</button>`;
        pill.querySelector("button").onclick = () => {
          uploadedFiles = uploadedFiles.filter(u => u.id !== f.id);
          renderFileList();
        };
        attachedEl.appendChild(pill);
      }
    }
    renderFileList();
    const actorId = localStorage.getItem("agent_actor_id") || crypto.randomUUID();
    localStorage.setItem("agent_actor_id", actorId);
    let sessions = JSON.parse(localStorage.getItem("agent_sessions") || "[]");
    let currentSessionId = localStorage.getItem("agent_current_session") || null;

    function persistSessions() { localStorage.setItem("agent_sessions", JSON.stringify(sessions)); }
    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function renderInlineMarkdown(value) {
      let html = escapeHtml(value || "");

      // Images generated by backend
      html = html.replace(/!\[([^\]]*)\]\((\/(?:assets|results)\/[A-Za-z0-9._\/-]+)\)/g, (_, alt, src) => {
        const cacheSafeSrc = src.startsWith("/results/") ? `${src}?_t=${Date.now()}` : src;
        return `<img src="${cacheSafeSrc}" alt="${alt}" loading="lazy" />`;
      });

      // Inline code first, then bold
      html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return html;
    }

    function looksNumeric(value) {
      const s = String(value || "").trim();
      if (!s) return false;
      return /^[-+]?[\d,.]+%?$/.test(s) || /^\+?[-\d,.]+\s?(pts|điểm %|MB|KB|users|rows)?$/i.test(s);
    }

    function renderHtmlTable(rows, align = []) {
      if (!rows.length) return "";
      const header = rows[0];
      const body = rows.slice(1);
      const th = header.map((h, idx) => `<th class="${align[idx] === "right" ? "num" : ""}">${renderInlineMarkdown(h)}</th>`).join("");
      const trs = body.map(row => {
        const tds = row.map((cell, idx) => {
          const cls = align[idx] === "right" || (!align[idx] && looksNumeric(cell)) ? "num" : "";
          return `<td class="${cls}">${renderInlineMarkdown(cell)}</td>`;
        }).join("");
        return `<tr>${tds}</tr>`;
      }).join("");
      return `<div class="data-table-wrap"><table class="data-table"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table></div>`;
    }

    function parseMarkdownTable(lines, start) {
      if (start + 1 >= lines.length) return null;
      const headerLine = lines[start].trim();
      const sepLine = lines[start + 1].trim();
      if (!headerLine.includes("|") || !/^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(sepLine)) return null;

      const split = (line) => line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(v => v.trim());
      const header = split(headerLine);
      const sep = split(sepLine);
      const align = sep.map(s => s.endsWith(":") ? "right" : "left");
      const rows = [header];
      let i = start + 2;
      while (i < lines.length && lines[i].trim().includes("|") && lines[i].trim() !== "") {
        const row = split(lines[i]);
        if (row.length === header.length) rows.push(row);
        i++;
      }
      return { html: renderHtmlTable(rows, align), next: i };
    }

    function parseDashTable(lines, start) {
      const line = lines[start].trim();
      if (!line.startsWith("- ") || !line.includes("—")) return null;

      const split = (l) => l.trim().replace(/^-\s*/, "").split("—").map(v => v.trim()).filter(Boolean);
      const header = split(line);
      if (header.length < 2) return null;

      const rows = [header];
      let i = start + 1;
      while (i < lines.length) {
        const cur = lines[i].trim();
        if (!cur.startsWith("- ") || !cur.includes("—")) break;
        const row = split(cur);
        if (row.length !== header.length) break;
        rows.push(row);
        i++;
      }
      if (rows.length < 2) return null;
      return { html: renderHtmlTable(rows), next: i };
    }

    function renderParagraph(lines) {
      const text = lines.join(" ").trim();
      if (!text) return "";
      return `<p>${renderInlineMarkdown(text)}</p>`;
    }

    function renderMarkdownSegment(segment) {
      const lines = String(segment || "").replace(/\r\n/g, "\n").split("\n");
      let html = "";
      let i = 0;

      while (i < lines.length) {
        const raw = lines[i];
        const line = raw.trim();

        if (!line) { i++; continue; }

        const table = parseMarkdownTable(lines, i);
        if (table) { html += table.html; i = table.next; continue; }

        const dashTable = parseDashTable(lines, i);
        if (dashTable) { html += dashTable.html; i = dashTable.next; continue; }

        if (/^#{1,4}\s+/.test(line)) {
          const level = Math.min((line.match(/^#+/) || ["###"])[0].length, 4);
          const tag = level <= 3 ? "h3" : "h4";
          html += `<${tag}>${renderInlineMarkdown(line.replace(/^#{1,4}\s+/, ""))}</${tag}>`;
          i++; continue;
        }

        if (/^\*\*[^*]+\*\*\s*$/.test(line)) {
          html += `<h4>${renderInlineMarkdown(line.replace(/\*\*/g, ""))}</h4>`;
          i++; continue;
        }

        if (/^[-*]\s+/.test(line)) {
          const items = [];
          while (i < lines.length && /^[-*]\s+/.test(lines[i].trim()) && !lines[i].includes("—")) {
            items.push(lines[i].trim().replace(/^[-*]\s+/, ""));
            i++;
          }
          html += `<ul>${items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`;
          continue;
        }

        if (/^\d+[.)]\s+/.test(line)) {
          const items = [];
          while (i < lines.length && /^\d+[.)]\s+/.test(lines[i].trim())) {
            items.push(lines[i].trim().replace(/^\d+[.)]\s+/, ""));
            i++;
          }
          html += `<ol>${items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ol>`;
          continue;
        }

        const para = [];
        while (
          i < lines.length &&
          lines[i].trim() &&
          !/^#{1,4}\s+/.test(lines[i].trim()) &&
          !/^[-*]\s+/.test(lines[i].trim()) &&
          !/^\d+[.)]\s+/.test(lines[i].trim()) &&
          !parseMarkdownTable(lines, i) &&
          !parseDashTable(lines, i)
        ) {
          para.push(lines[i].trim());
          i++;
        }
        html += renderParagraph(para);
      }

      return html;
    }

    function renderFencedBlock(lang, code) {
      const escaped = escapeHtml(code.replace(/\n$/, ""));
      const isDataLike = (lang || "").toLowerCase() === "text" || /^\s*\+[-+]+\+\s*\n\s*\|/m.test(code);
      const cls = isDataLike ? "data-output" : "code-output";
      return `<pre class="${cls}"><code>${escaped}</code></pre>`;
    }

    function renderMessageHtml(text) {
      const src = String(text || "");
      const parts = [];
      const fenceRe = /```([A-Za-z0-9_-]*)\n([\s\S]*?)```/g;
      let last = 0;
      let match;

      while ((match = fenceRe.exec(src)) !== null) {
        if (match.index > last) parts.push(renderMarkdownSegment(src.slice(last, match.index)));
        parts.push(renderFencedBlock(match[1], match[2]));
        last = fenceRe.lastIndex;
      }
      if (last < src.length) parts.push(renderMarkdownSegment(src.slice(last)));

      return parts.join("");
    }
    function displayFileName(filename) {
      return String(filename || "").replace(/[.][^.]+$/, "");
    }
    function addMessage(role, text, className = "") {
      const node = document.createElement("div");
      node.className = `message ${role} ${className}`;
      if (role === "assistant") node.innerHTML = renderMessageHtml(text);
      else node.textContent = text;
      chatEl.appendChild(node);
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function addProcessMessage() {
      const node = document.createElement("div");
      node.className = "process";
      node.innerHTML = `
        <div class="process-head">
          <div class="process-head-left">
            <div class="process-spinner"></div>
            <span class="process-done-icon">✓</span>
            <span class="process-label">Agent đang xử lý...</span>
          </div>
          <button class="process-toggle" type="button">Thu gọn</button>
        </div>
        <div class="process-body">
          <div class="process-skeleton">
            <div class="skeleton-line" style="width:80%"></div>
            <div class="skeleton-line" style="width:65%"></div>
            <div class="skeleton-line"></div>
          </div>
          <ol class="process-list" style="display:none"></ol>
        </div>`;
      // Append to the DOM FIRST so the bar is guaranteed visible even if any
      // later wiring throws — then attach the toggle handler defensively.
      chatEl.appendChild(node);
      chatEl.scrollTop = chatEl.scrollHeight;
      const btn = node.querySelector(".process-toggle");
      if (btn) btn.onclick = () => {
        node.classList.toggle("collapsed");
        btn.textContent = node.classList.contains("collapsed") ? "Mở rộng" : "Thu gọn";
      };
      return node;
    }
    function updateProcessMessage(node, steps = [], done = false) {
      if (!node) return;
      const skeleton = node.querySelector(".process-skeleton");
      const list = node.querySelector(".process-list");
      const label = node.querySelector(".process-label");
      if (steps.length > 0) {
        if (skeleton) skeleton.style.display = "none";
        list.style.display = "";
        list.innerHTML = "";
        for (const step of steps) {
          const item = document.createElement("li");
          item.className = "process-step";
          item.innerHTML = `<div class="step-dot"></div><div class="step-text">${escapeHtml(step.message || String(step))}</div>`;
          list.appendChild(item);
        }
      }
      if (done) {
        if (skeleton) skeleton.style.display = "none";
        list.style.display = "";
        node.classList.add("done");
        if (label) label.textContent = "Hoàn thành";
      }
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function upsertSessionTitle(message) {
      const session = sessions.find((item) => item.id === currentSessionId);
      if (session && session.title === "New chat") {
        session.title = message.slice(0, 42) || "New chat";
        persistSessions(); renderSessions();
        titleEl.textContent = session.title;
      }
    }
    function createSession() {
      const session = { id: crypto.randomUUID(), title: "New chat", createdAt: new Date().toISOString() };
      sessions.unshift(session); currentSessionId = session.id;
      localStorage.setItem("agent_current_session", currentSessionId); persistSessions(); renderSessions(); loadSession(currentSessionId, true);
    }
    function renderSessions() {
      sessionsEl.innerHTML = "";
      for (const session of sessions) {
        const node = document.createElement("div");
        node.className = `session-item ${session.id === currentSessionId ? "active" : ""}`;
        node.innerHTML = `
          <div class="session-row">
            <div class="session-meta">
              <div class="session-title">${escapeHtml(session.title)}</div>
              <div class="muted">${new Date(session.createdAt).toLocaleString()}</div>
            </div>
            <div class="session-actions">
              <button class="icon-button rename-session" type="button" title="Đổi tên">Sửa</button>
              <button class="icon-button danger delete-session" type="button" title="Xoá">Xoá</button>
            </div>
          </div>`;
        node.onclick = () => { currentSessionId = session.id; localStorage.setItem("agent_current_session", currentSessionId); renderSessions(); loadSession(currentSessionId); };
        node.ondblclick = () => renameSession(session.id, node);
        node.querySelector(".rename-session").onclick = (event) => { event.stopPropagation(); renameSession(session.id, node); };
        node.querySelector(".delete-session").onclick = (event) => { event.stopPropagation(); deleteSession(session.id); };
        sessionsEl.appendChild(node);
      }
    }
    function renameSession(sessionId, node) {
      const session = sessions.find((item) => item.id === sessionId);
      if (!session) return;
      const input = document.createElement("input");
      input.className = "session-title-input";
      input.value = session.title;
      node.innerHTML = "";
      node.appendChild(input);
      input.focus(); input.select();
      function save() {
        const title = input.value.trim();
        if (title) session.title = title;
        persistSessions(); renderSessions();
        if (sessionId === currentSessionId) titleEl.textContent = session.title;
      }
      input.onblur = save;
      input.onkeydown = (event) => {
        if (event.key === "Enter") { event.preventDefault(); input.blur(); }
        if (event.key === "Escape") renderSessions();
      };
    }
    function deleteSession(sessionId) {
      sessions = sessions.filter((item) => item.id !== sessionId);
      if (currentSessionId === sessionId) {
        currentSessionId = sessions[0]?.id || null;
        if (currentSessionId) localStorage.setItem("agent_current_session", currentSessionId);
        else localStorage.removeItem("agent_current_session");
      }
      persistSessions();
      if (!sessions.length) createSession();
      else { renderSessions(); loadSession(currentSessionId); }
    }
    async function loadSession(sessionId, isNew = false) {
      titleEl.textContent = sessions.find((item) => item.id === sessionId)?.title || "Analytics Agent";
      chatEl.innerHTML = "";
      showSuggestions(true);
      if (isNew) { return; }
      try {
        const response = await fetch(`/sessions/${sessionId}/events?actor_id=${encodeURIComponent(actorId)}`);
        const data = await response.json();
        if (data.events?.length) {
          chatEl.innerHTML = "";
          showSuggestions(false);
          for (const event of data.events) addMessage(event.role === "user" ? "user" : "assistant", event.message || "");
        }
      } catch {}
    }
    async function loadFiles() {
      return;
    }
    inputEl.addEventListener("change", async () => {
      if (!inputEl.files.length) return;
      const MAX = 31457280;
      for (const file of inputEl.files) {
        if (file.size > MAX) {
          addMessage("assistant", `❌ File "${file.name}" vượt quá 30MB. Vui lòng chọn file nhỏ hơn.`, "error");
          inputEl.value = ""; return;
        }
      }
      const formData = new FormData();
      for (const file of inputEl.files) formData.append("files", file);
      sendEl.disabled = true;
      const response = await fetch("/uploads", { method: "POST", body: formData });
      const data = await response.json();
      sendEl.disabled = false;
      if (!response.ok) {
        addMessage("assistant", data.message || "Upload lỗi.", "error");
      } else {
        for (const f of (data.files || [])) {
          uploadedFiles.push({ id: f.id, filename: f.filename, size: f.size });
        }
        renderFileList();
      }
      inputEl.value = "";
    });
    async function readJsonSafely(response) {
      // Read the body as text ONCE, then parse — calling .json() then .text() on
      // the same response throws "body already read" and masked real errors.
      const raw = await response.text();
      try { return JSON.parse(raw); } catch { return { status:"error", message: raw || "Phản hồi không hợp lệ." }; }
    }
    async function pollJob(jobId, processNode) {
      // 300 attempts × 1s ≈ 5 min — comfortably longer than the backend's bounded
      // LLM calls, so the UI only times out if the server is truly unresponsive.
      let transientErrors = 0;
      for (let attempt = 0; attempt < 300; attempt++) {
        let response, data;
        try {
          response = await fetch(`/jobs/${jobId}`);
          data = await readJsonSafely(response);
        } catch {
          // Network blip — keep polling a few times before giving up.
          if (++transientErrors > 5) {
            updateProcessMessage(processNode, [], true);
            return { status:"error", message:"Mất kết nối tới agent. Vui lòng thử lại." };
          }
          await new Promise((resolve) => setTimeout(resolve, 1000));
          continue;
        }
        transientErrors = 0;
        const isDone = !response.ok || data.status === "error" || data.status === "completed";
        updateProcessMessage(processNode, data.process || [], isDone);
        if (!response.ok || data.status === "error") return data.result || data;
        if (data.status === "completed") return data.result;
        await new Promise((resolve) => setTimeout(resolve, 1000));
      }
      updateProcessMessage(processNode, [], true);
      return { status:"error", message:"Agent xử lý quá lâu. Vui lòng thử lại." };
    }
    messageEl.addEventListener("keydown", (event) => { if (event.key === "Enter" && !event.shiftKey) { event.preventDefault(); formEl.requestSubmit(); } });
    formEl.addEventListener("submit", async (event) => {
      event.preventDefault(); if (!currentSessionId) createSession();
      const message = messageEl.value.trim(); if (!message || sendEl.disabled) return;
      const fileIds = uploadedFiles.map(f => f.id);
      const fileNames = uploadedFiles.map(f => f.filename);
      showSuggestions(false);
      let userText = message;
      if (fileNames.length) userText += "\n📎 " + fileNames.join(", ");
      addMessage("user", userText); upsertSessionTitle(message); messageEl.value = ""; sendEl.disabled = true;
      uploadedFiles = []; renderFileList();
      // Show the process bar immediately — double rAF guarantees a paint before fetch.
      const processNode = addProcessMessage();
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      try {
        const response = await fetch("/chat", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ message, file_ids:fileIds, actor_id:actorId, session_id:currentSessionId }) });
        const started = await readJsonSafely(response);
        if (!response.ok || started.status === "error") {
          if (processNode) processNode.remove();
          addMessage("assistant", started.message || "Agent trả về lỗi.", "error"); return;
        }
        updateProcessMessage(processNode, started.process || [{ message:"Đã nhận câu hỏi và đưa vào hàng đợi." }]);
        const data = await pollJob(started.job_id, processNode);
        addMessage("assistant", data.response || data.message || JSON.stringify(data, null, 2), data.status === "error" ? "error" : "");
      } catch (error) {
        if (processNode) processNode.remove();
        addMessage("assistant", `Không gọi được agent. Vui lòng thử lại. Chi tiết: ${error.message}`, "error"); messageEl.value = message;
      }
      finally { statusEl.textContent = "ready"; sendEl.disabled = false; messageEl.focus(); }
    });
    document.getElementById("new-session").onclick = createSession;
    if (!sessions.length || !currentSessionId) createSession(); else { renderSessions(); loadSession(currentSessionId); }
    loadFiles(); messageEl.focus();

    // === SEARCH ===
    const searchToggleBtn = document.getElementById("search-toggle");
    const searchBar = document.getElementById("search-bar");
    const searchInput = document.getElementById("search-input");
    const searchCount = document.getElementById("search-count");
    const searchPrev = document.getElementById("search-prev");
    const searchNext = document.getElementById("search-next");
    const searchClose = document.getElementById("search-close");
    let searchMatches = [], searchIndex = -1;

    function highlightNode(node, query) {
      // Walk all text nodes inside `node` and wrap matches with <mark>
      const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
      const walker = document.createTreeWalker(node, NodeFilter.SHOW_TEXT);
      const hits = [];
      let cur;
      while ((cur = walker.nextNode())) {
        if (re.test(cur.textContent)) hits.push(cur);
        re.lastIndex = 0;
      }
      hits.forEach(textNode => {
        const parts = textNode.textContent.split(re);
        const matches = textNode.textContent.match(re) || [];
        if (!matches.length) return;
        const frag = document.createDocumentFragment();
        parts.forEach((part, i) => {
          if (part) frag.appendChild(document.createTextNode(part));
          if (matches[i]) {
            const mark = document.createElement("mark");
            mark.textContent = matches[i];
            frag.appendChild(mark);
          }
        });
        textNode.parentNode.replaceChild(frag, textNode);
      });
    }

    function removeHighlights(node) {
      node.querySelectorAll("mark").forEach(mark => {
        const parent = mark.parentNode;
        parent.replaceChild(document.createTextNode(mark.textContent), mark);
        parent.normalize();
      });
    }

    function clearSearch() {
      chatEl.querySelectorAll(".message").forEach(m => {
        m.classList.remove("search-current");
        removeHighlights(m);
      });
      searchMatches = []; searchIndex = -1;
      searchCount.textContent = "";
    }

    function runSearch(query) {
      clearSearch();
      if (!query.trim()) return;
      chatEl.querySelectorAll(".message:not(.process)").forEach(m => {
        if (m.textContent.toLowerCase().includes(query.toLowerCase())) {
          highlightNode(m, query);
          searchMatches.push(m);
        }
      });
      searchIndex = searchMatches.length > 0 ? 0 : -1;
      updateSearchNav();
    }

    function updateSearchNav() {
      searchMatches.forEach(m => m.classList.remove("search-current"));
      if (!searchMatches.length) { searchCount.textContent = "Không tìm thấy"; return; }
      searchCount.textContent = `${searchIndex + 1} / ${searchMatches.length}`;
      searchMatches[searchIndex].classList.add("search-current");
      searchMatches[searchIndex].scrollIntoView({ behavior: "smooth", block: "center" });
    }

    searchInput.addEventListener("input", () => runSearch(searchInput.value));
    searchInput.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); e.shiftKey ? searchPrev.click() : searchNext.click(); }
      if (e.key === "Escape") searchClose.click();
    });
    searchNext.addEventListener("click", () => {
      if (!searchMatches.length) return;
      searchIndex = (searchIndex + 1) % searchMatches.length;
      updateSearchNav();
    });
    searchPrev.addEventListener("click", () => {
      if (!searchMatches.length) return;
      searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length;
      updateSearchNav();
    });
    searchClose.addEventListener("click", () => {
      searchBar.classList.remove("open");
      searchToggleBtn.classList.remove("active");
      clearSearch(); searchInput.value = "";
    });
    searchToggleBtn.addEventListener("click", () => {
      const open = searchBar.classList.toggle("open");
      searchToggleBtn.classList.toggle("active", open);
      if (open) { searchInput.focus(); } else { clearSearch(); searchInput.value = ""; }
    });
    document.addEventListener("keydown", e => {
      if ((e.metaKey || e.ctrlKey) && e.key === "f") {
        e.preventDefault();
        searchBar.classList.add("open"); searchToggleBtn.classList.add("active");
        searchInput.focus(); searchInput.select();
      }
    });
  </script>
</body>
</html>
